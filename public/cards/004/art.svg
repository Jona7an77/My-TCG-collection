<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
  <defs>
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"></stop>
      <stop offset="1" stop-color="#22d3ee"></stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"></feGaussianBlur>
      <feColorMatrix in="b" type="matrix" values="
